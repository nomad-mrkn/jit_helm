{{- if .Values.markerRole.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.appName }}-mark-completed
  namespace: {{ .Values.namespace }}
  annotations:
    {{- include "jit-helm.jobAnnotations" . | nindent 4 }}
  labels:
    {{- include "jit-helm.labels" . | nindent 4 }}
spec:
  ttlSecondsAfterFinished: 60
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "jit-helm.labels" . | nindent 8 }}
    spec:
      serviceAccountName: jit-rbac-marker-{{ .Values.appName }}
      restartPolicy: Never
      containers:
      - name: mark-completed
        image: "{{ .Values.image }}"
        imagePullPolicy: {{ .Values.imagePullPolicy | default "IfNotPresent" }}
        env:
        - name: JIT_RBAC_APP
          value: {{ .Values.appName | quote }}
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -euo pipefail
            echo "Marking sync completed for ${JIT_RBAC_APP}"
            kubectl label clusterrole -l jit-rbac/app=${JIT_RBAC_APP} \
              jit-rbac/sync-status=completed --overwrite
            kubectl label clusterrolebinding -l jit-rbac/app=${JIT_RBAC_APP} \
              jit-rbac/sync-status=completed --overwrite
            kubectl label serviceaccount -n "${POD_NAMESPACE}" -l jit-rbac/app=${JIT_RBAC_APP} \
              jit-rbac/sync-status=completed --overwrite
            echo "Done"
{{- end }}
