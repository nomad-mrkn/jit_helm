---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.roleName }}
  annotations:
    {{- include "jit-helm.jitAnnotations" . | nindent 4 }}
  labels:
    {{- include "jit-helm.labels" . | nindent 4 }}
rules:
{{- toYaml .Values.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.roleName }}
  annotations:
    {{- include "jit-helm.jitAnnotations" . | nindent 4 }}
  labels:
    {{- include "jit-helm.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.roleName }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccountName }}
    namespace: {{ .Values.serviceAccountNamespace }}
