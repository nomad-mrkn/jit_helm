{{- if .Values.markerRole.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jit-rbac-marker-{{ .Values.appName }}
  namespace: {{ .Values.namespace }}
  annotations:
    {{- include "jit-helm.markerAnnotations" . | nindent 4 }}
  labels:
    {{- include "jit-helm.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jit-rbac-marker-{{ .Values.appName }}
  annotations:
    {{- include "jit-helm.markerAnnotations" . | nindent 4 }}
  labels:
    {{- include "jit-helm.labels" . | nindent 4 }}
rules:
{{- if .Values.markerRole.rules }}
{{- toYaml .Values.markerRole.rules | nindent 2 }}
{{- else }}
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "patch", "update", "bind", "escalate"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "patch"]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jit-rbac-marker-{{ .Values.appName }}
  annotations:
    {{- include "jit-helm.markerAnnotations" . | nindent 4 }}
  labels:
    {{- include "jit-helm.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jit-rbac-marker-{{ .Values.appName }}
subjects:
  - kind: ServiceAccount
    name: jit-rbac-marker-{{ .Values.appName }}
    namespace: {{ .Values.namespace }}
{{- end }}
