apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-spb2-backend1-dex-auth
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  syncPolicy:
    automated:
      prune: true
    syncOptions:
    - CreateNamespace=true
    - SkipDryRunOnMissingResource=true
    - RespectIgnoreDifferences=true
  project: default
  ignoreDifferences:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      jsonPointers:
        - /metadata/labels/jit-rbac~1sync-status
        - /metadata/annotations
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      jsonPointers:
        - /metadata/labels/jit-rbac~1sync-status
        - /metadata/annotations
    - group: ""
      kind: ServiceAccount
      jsonPointers:
        - /metadata/labels/jit-rbac~1sync-status
        - /metadata/annotations
  destination:
    name: kind-test-1
    namespace: dex-auth
  sources:
    # Source 1: JIT RBAC via Helm
    - repoURL: 'https://github.com/nomad-mrkn/charts.git'
      targetRevision: HEAD
      path: jit-rbac-argo
      helm:
        releaseName: jit-dex-auth
        valueFiles:
          - apps-rules/dex-auth.yaml
    # Source 2: dex-k8s-authenticator Helm chart
    - repoURL: 'https://github.com/nomad-mrkn/charts.git'
      targetRevision: HEAD
      path: dex-k8s-authenticator
      helm:
        releaseName: dex-k8s-authenticator
        values: |
          image:
            repository: docker.io/mintel/dex-k8s-authenticator
            tag: 1.4.0
            pullPolicy: IfNotPresent
          dexK8sAuthenticator:
            clusters:
            - name: k8s-spb2-backend1
              short_description: "k8s-spb2-backend1"
              description: "Example Cluster Long Description..."
              client_secret: ${KEYCLOACK-SECRET}
              issuer: "https://accounts.google.com"
              k8s_ca_pem_file: /etc/ca.crt
              k8s_master_uri: "https://k8s-spb2-backend1-api.qq:8002"
              client_id: k8s-spb2-backend1
              redirect_uri: http://k8s-spb2-backend1-auth.qq/callback
          ingress:
            enabled: true
            annotations:
              kubernetes.io/ingress.class: haproxy
            path: /
            pathType: Prefix
            hosts:
              - "k8s-spb2-backend1-auth.qq"
            tls: []
          podEnv:
            - name: KEYCLOACK-SECRET
              value: "dummy-secret-value"
          healthCheckPath: /
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "exit 0"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "exit 0"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
