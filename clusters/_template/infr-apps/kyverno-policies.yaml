apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-spb2-backend1-kyverno-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  syncPolicy:
    automated:
      prune: true
    syncOptions:
    - CreateNamespace=true
    - SkipDryRunOnMissingResource=true
    - RespectIgnoreDifferences=true
  project: default
  ignoreDifferences:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      jsonPointers:
        - /metadata/labels/jit-rbac~1sync-status
        - /metadata/annotations
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      jsonPointers:
        - /metadata/labels/jit-rbac~1sync-status
        - /metadata/annotations
    - group: ""
      kind: ServiceAccount
      jsonPointers:
        - /metadata/labels/jit-rbac~1sync-status
        - /metadata/annotations
    - group: batch
      kind: Job
  destination:
    name: kind-test-1
    namespace: kyverno
  sources:
    # Source 1: JIT RBAC via Helm
    - repoURL: 'https://github.com/nomad-mrkn/charts.git'
      targetRevision: HEAD
      path: jit-rbac-argo
      helm:
        releaseName: jit-kyverno-policies
        valueFiles:
          - apps-rules/kyverno-policies.yaml
    # Source 2: Helm chart
    - repoURL: 'https://github.com/nomad-mrkn/charts.git'
      targetRevision: HEAD
      path: kyverno-policies
      helm:
        releaseName: kyverno-policies
        values: |
          denyRoleAggregation:
            validationFailureAction: Audit
          denyBuiltInUsers:
            validationFailureAction: Enforce
          impersonate:
            validationFailureAction: Audit
          runAsNonRoot:
            validationFailureAction: Audit
            exclude:
              any:
                - resources:
                    namespaces:
                      - kube-system
                      - jenkins-devops
                      - profiler
                      - kyverno
                      - falco
                      - linkerd
                      - linkerd-viz
                      - fluent-bit
                - resources:
                    namespaces:
                      - trivy-operator
                    selector:
                      matchLabels:
                        app: node-collector
          runAsNonRootGroup:
            validationFailureAction: Audit
            exclude:
              any:
                - resources:
                    namespaces:
                      - kube-system
                      - jenkins-devops
                      - profiler
                      - kyverno
                      - falco
                      - linkerd
                      - linkerd-viz
                      - fluent-bit
                      - keda
                - resources:
                    namespaces:
                      - trivy-operator
                    selector:
                      matchLabels:
                        app: node-collector
          disallowPrivileged:
            validationFailureAction: Enforce
            exclude:
              any:
                - resources:
                    namespaces:
                      - kube-system
                      - jenkins-devops
                      - profiler
                      - linkerd
                      - linkerd-viz
                      - falco
                      - fluent-bit
                - resources:
                    namespaces:
                      - trivy-operator
                    selector:
                      matchLabels:
                        app: node-collector
          rootFsReadyOnly:
            validationFailureAction: Audit
            exclude:
              any:
                - resources:
                    namespaces:
                      - kube-system
                      - jenkins-devops
                      - profiler
                      - linkerd
                      - linkerd-viz
                      - falco
                      - fluent-bit
          requestsLimits:
            validationFailureAction: Audit
            exclude:
              any:
                - resources:
                    namespaces:
                      - kube-system
                      - jenkins-devops
                      - profiler
                      - linkerd
                      - linkerd-viz
                      - trivy-operator
          requestsEqLimits:
            validationFailureAction: Audit
            exclude:
              any:
                - resources:
                    namespaces:
                      - kube-system
                      - jenkins-devops
                      - profiler
                      - linkerd
                      - linkerd-viz
                      - trivy-operator
          # verifyImages disabled for test environment (requires at least one image reference)
          verifyImages: null
          # verifyImagesExceptions also disabled since verifyImages is disabled
          verifyImagesExceptions: null
          restrictLinkerdIdentityIssuer:
            validationFailureAction: Audit
          mutateNsPolicy:
            - name: "linkerd-privileged"
              labels:
                pod-security.kubernetes.io/enforce: privileged
                pod-security.kubernetes.io/audit: privileged
                pod-security.kubernetes.io/warn: baseline
              exclude:
                any:
                  - resources:
                      namespaces:
                        - kube-system
                        - jenkins-devops
                        - kyverno
                        - default
                        - kube-public
                        - kube-node-lease
                        - falco
          customPodSecurity:
            - name: "baseline-linkerd"
              level: baseline
              version: latest
              exclude:
                any:
                  - resources:
                      namespaces:
                        - kube-system
                        - jenkins-devops
                        - kyverno
                        - default
                        - kube-public
                        - kube-node-lease
                        - falco
                        - fluent-bit
                        - vector
                  - resources:
                      namespaces:
                        - trivy-operator
                    selector:
                      matchLabels:
                        app: node-collector
              securityExclusions:
                - controlName: Capabilities
                  images:
                    - "*/linkerd/proxy-init*"
          restrictLinkerdPodAnnotation:
            validationFailureAction: Audit
            exclude:
              any:
                - resources:
                    namespaces:
                      - kube-system
                      - jenkins-devops
                      - kyverno
                      - default
                      - kube-public
                      - kube-node-lease
                      - falco
                      - rekko-service
                      - split-service
                      - split-web
                      - linkerd
                      - linkerd-viz
                      - verdicts
                      - log-analyzer
                      - trivy-operator
                      - trivy-proxy
