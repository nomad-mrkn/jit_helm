apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-spb2-backend1-kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  syncPolicy:
    automated:
      prune: true
    syncOptions:
    - CreateNamespace=true
    - SkipDryRunOnMissingResource=true
    - RespectIgnoreDifferences=true
  project: default
  ignoreDifferences:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      jsonPointers:
        - /metadata/labels/jit-rbac~1sync-status
        - /metadata/annotations
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      jsonPointers:
        - /metadata/labels/jit-rbac~1sync-status
        - /metadata/annotations
    - group: ""
      kind: ServiceAccount
      jsonPointers:
        - /metadata/labels/jit-rbac~1sync-status
        - /metadata/annotations
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: batch
      kind: Job
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /metadata/annotations
  destination:
    name: kind-test-1
    namespace: kyverno
  sources:
    # Source 1: JIT RBAC via Helm
    - repoURL: 'https://github.com/nomad-mrkn/charts.git'
      targetRevision: HEAD
      path: jit-rbac-argo
      helm:
        releaseName: jit-kyverno
        valueFiles:
          - apps-rules/kyverno.yaml
    # Source 2: Helm chart
    - repoURL: 'https://kyverno.github.io/kyverno/'
      targetRevision: 3.2.7
      chart: kyverno
      helm:
        releaseName: kyverno
        values: |
          crds:
            install: true
            groups:
              kyverno:
                clusterpolicies: true
                policies: true
            annotations:
              argocd.argoproj.io/sync-options: ServerSideApply=true
          webhooksCleanup:
            image:
              registry: docker.io
              repository: alpine/k8s
              tag: "1.28.5"
              pullPolicy: IfNotPresent
          features:
            policyExceptions:
              enabled: true
          cleanupJobs:
            admissionReports:
              image:
                registry: docker.io
                repository: alpine/k8s
                tag: "1.28.5"
                pullPolicy: IfNotPresent
              resources:
                limits:
                  memory: 512Mi
                  cpu: 500m
                requests:
                  memory: 64Mi
                  cpu: 50m
            clusterAdmissionReports:
              image:
                registry: docker.io
                repository: alpine/k8s
                tag: "1.28.5"
                pullPolicy: IfNotPresent
              resources:
                limits:
                  memory: 512Mi
                  cpu: 500m
                requests:
                  memory: 64Mi
                  cpu: 50m
            updateRequests:
              image:
                registry: docker.io
                repository: alpine/k8s
                tag: "1.28.5"
                pullPolicy: IfNotPresent
              resources:
                limits:
                  memory: 512Mi
                  cpu: 500m
                requests:
                  memory: 64Mi
                  cpu: 50m
            ephemeralReports:
              image:
                registry: docker.io
                repository: alpine/k8s
                tag: "1.28.5"
                pullPolicy: IfNotPresent
              resources:
                limits:
                  memory: 512Mi
                  cpu: 500m
                requests:
                  memory: 64Mi
                  cpu: 50m
            clusterEphemeralReports:
              image:
                registry: docker.io
                repository: alpine/k8s
                tag: "1.28.5"
                pullPolicy: IfNotPresent
              resources:
                limits:
                  memory: 512Mi
                  cpu: 500m
                requests:
                  memory: 64Mi
                  cpu: 50m
          admissionController:
            initContainer:
              image:
                registry: ghcr.io
                repository: kyverno/kyvernopre
                tag: v1.12.5
            container:
              extraArgs:
                loggingFormat: json
              image:
                registry: ghcr.io
                repository: kyverno/kyverno
                tag: v1.12.5
              resources:
                limits:
                  memory: 512Mi
                  cpu: 500m
                requests:
                  memory: 128Mi
                  cpu: 100m
          backgroundController:
            rbac:
              clusterRole:
                extraResources:
                  - apiGroups:
                      - ""
                    resources:
                      - namespaces
                    verbs:
                      - patch
                      - update
            extraArgs:
              loggingFormat: json
            image:
              registry: ghcr.io
              repository: kyverno/background-controller
              tag: v1.12.5
            resources:
              limits:
                memory: 1Gi
                cpu: 500m
              requests:
                memory: 128Mi
                cpu: 100m
          cleanupController:
            rbac:
              clusterRole:
                extraResources:
                  - apiGroups:
                      - ""
                    resources:
                      - namespaces
                    verbs:
                      - delete
            extraArgs:
              loggingFormat: json
            image:
              registry: ghcr.io
              repository: kyverno/cleanup-controller
              tag: v1.12.5
            resources:
              limits:
                memory: 256Mi
                cpu: 250m
              requests:
                memory: 64Mi
                cpu: 50m
          reportsController:
            resources:
              limits:
                memory: 1Gi
                cpu: 1
              requests:
                cpu: 100m
                memory: 128Mi
            extraArgs:
              loggingFormat: json
            image:
              registry: ghcr.io
              repository: kyverno/reports-controller
              tag: v1.12.5
          policyReportsCleanup:
            enabled: true
            image:
              registry: docker.io
              repository: alpine/k8s
              tag: "1.28.5"
              pullPolicy: IfNotPresent
          tolerations: []
          nodeSelector: {}
          affinity: {}
